<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="description" content="Juego tipo raid por GPS en formato PWA" />
  <title>Raid GPS</title>

  <base href="https://ksizorcode.github.io/gpsgame/">

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Raid GPS" />

  <link rel="apple-touch-icon" href="assets/icon_f1.png">

  <!-- 👇 IMPORTANTE: permiso sensores iOS -->
  <script>
    async function requestSensorsPermission() {

      // 📱 iOS
      if (typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function") {

        const res = await DeviceOrientationEvent.requestPermission();

        if (res !== "granted") {
          alert("Permiso de orientación denegado");
          return false;
        }
      }

      return true;
    }
  </script>
</head>

<body>
  <div class="app-shell">

    <header class="topbar">
      <div>
        <p class="eyebrow">PWA · Raid interactiva</p>
        <h1>Raid GPS</h1>
      </div>
    </header>

    <main class="container">

      <!-- HERO -->
      <section class="card hero">
        <h2 id="currentPlaceName">Esperando inicio...</h2>
        <p id="currentInstruction">
          Pulsa en “Empezar” para activar sensores y GPS.
        </p>

        <div class="hero-stats">
          <div>
            <span>Distancia</span>
            <strong id="distanceText">-- m</strong>
          </div>

          <div>
            <span>Precisión</span>
            <strong id="accuracyText">-- m</strong>
          </div>
        </div>
      </section>

      <!-- CONTROLES -->
      <section class="card controls">
        <button id="startBtn" class="primary">Empezar</button>
        <button id="stopBtn" class="secondary">Detener</button>

        <p id="status">Necesita permisos de ubicación y sensores</p>
      </section>

      <!-- RADAR -->
      <section class="card radar">
        <div class="radar-center">
          <div class="radar-ring ring-1"></div>
          <div class="radar-ring ring-2"></div>
          <div class="radar-ring ring-3"></div>

          <div id="radarDot" class="radar-dot"></div>
          <div class="radar-core"></div>
        </div>
      </section>

    </main>
  </div>

  <!-- 👇 JS PRINCIPAL -->
  <script src="app.js"></script>

  <!-- 🚀 ACTIVACIÓN PERMISOS + GPS -->
  <script>
    let watchId = null;

    // 🧭 sensores
    let heading = 0;

    function handleOrientation(event) {
      if (event.alpha !== null) {
        heading = event.alpha;

        const dot = document.getElementById("radarDot");

        const rad = heading * Math.PI / 180;
        const r = 60;

        const x = Math.sin(rad) * r;
        const y = -Math.cos(rad) * r;

        dot.style.transform = `translate(${x}px, ${y}px)`;
      }
    }

    // 📡 GPS
    function startGPS() {
      if (!navigator.geolocation) return;

      watchId = navigator.geolocation.watchPosition((pos) => {
        document.getElementById("accuracyText").textContent =
          Math.round(pos.coords.accuracy) + " m";

      }, (err) => {
        console.error(err);
      }, {
        enableHighAccuracy: true
      });
    }

    // 🚀 START
    document.getElementById("startBtn").addEventListener("click", async () => {

      const ok = await requestSensorsPermission();
      if (!ok) return;

      // activar brújula
      window.addEventListener("deviceorientation", handleOrientation);

      // activar GPS
      startGPS();

      document.getElementById("status").textContent =
        "Sensores activados correctamente ✔";
    });

    // STOP
    document.getElementById("stopBtn").addEventListener("click", () => {

      if (watchId) navigator.geolocation.clearWatch(watchId);

      window.removeEventListener("deviceorientation", handleOrientation);

      document.getElementById("status").textContent =
        "Sensores detenidos";
    });

  </script>
</body>
</html>
